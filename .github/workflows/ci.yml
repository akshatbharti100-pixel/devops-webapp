name: DevOps CI Pipeline

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Simulate Build Process
        run: |
          echo "Starting build process..."
          echo "Build successful!"

      - name: Send Slack Notification (Success)
        if: success()
        run: curl -X POST -H 'Content-type: application/json' --data '{"text":"✅ *Success!* The GitHub Actions build for devops-webapp passed."}' ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack Notification (Failure)
        if: failure()
        run: curl -X POST -H 'Content-type: application/json' --data '{"text":"❌ *Alert!* The GitHub Actions build for devops-webapp failed."}' ${{ secrets.SLACK_WEBHOOK_URL }}